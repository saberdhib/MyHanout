name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .
      - name: Mypy (typecheck)
        run: mypy app
      - name: Pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///file:test?mode=memory&cache=shared&uri=true
        run: pytest

  integration-postgres:
    name: Integration — migrations + tests on pg16 + pgvector
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: myhanout
          POSTGRES_PASSWORD: myhanout
          POSTGRES_DB: myhanout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myhanout"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://myhanout:myhanout@localhost:5432/myhanout
      INTEGRATION_DATABASE_URL: postgresql+asyncpg://myhanout:myhanout@localhost:5432/myhanout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install ".[dev]"
      - name: Run Alembic migrations on real Postgres (CREATE EXTENSION vector)
        run: alembic upgrade head
      - name: Seed demo data
        run: python -m app.db.seed
      - name: Integration tests (real pg + pgvector)
        run: pytest -m integration

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  website:
    name: Website — build vitrine (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build

  ml-service:
    name: ML service — smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest

  e2e:
    name: E2E — Playwright (parcours critiques, stack keyless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend deps
        run: pip install "./backend[dev]"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json
      - name: Install frontend deps (build servi par vite preview)
        working-directory: frontend
        run: npm ci
      - name: Install e2e deps + Chromium
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E (boote API sqlite seedée + front preview)
        working-directory: e2e
        env:
          CI: "true"
        run: npx playwright test

  docker:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t myhanout-backend ./backend
      - name: Build frontend image
        run: docker build -t myhanout-frontend ./frontend
      - name: Build ml-service image
        run: docker build -t myhanout-ml-service ./ml-service

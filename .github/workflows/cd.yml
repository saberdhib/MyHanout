name: CD — build & push images

# Continuous delivery : construit et pousse les images vers GHCR.
# - push sur `main` -> tags `:main` + `:sha-<court>` (déployable en continu).
# - tag `v*`        -> tags `:<version>` + `:latest` (release).
# Le déploiement effectif (pull sur le serveur) reste opéré côté infra (cf. docs/DEPLOY.md).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
          - image: frontend
            context: ./frontend
          - image: ml-service
            context: ./ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Namespace GHCR (minuscules)
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/myhanout-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

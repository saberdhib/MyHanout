# Prometheus : scrape des métriques applicatives (API FastAPI /metrics).
# L'API tourne dans la stack applicative ; on l'atteint via host-gateway.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: myhanout-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: myhanout-api

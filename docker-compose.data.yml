# Stack DATA (analytique/observabilité) — complète la stack applicative.
# Démarrage : docker compose -f docker-compose.data.yml up -d
# Cloud-ready : MinIO == S3/GCS, Grafana managé, Postgres managé en prod.
#
# Les services se connectent au Postgres applicatif via host.docker.internal
# (fonctionne aussi sous Linux grâce à host-gateway), donc indépendant du nom
# de réseau de la stack applicative.

services:
  # --- Raw zone (S3-compatible) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Crée le bucket raw au démarrage (idempotent).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      mc mb -p local/myhanout-raw || true;
      echo 'bucket myhanout-raw prêt';
      "

  # --- Métriques (scrape de l'API /metrics) ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./analytics/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # --- Observabilité métier/technique ---
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./analytics/grafana/provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # --- Explorateur SQL léger (debug pg) ---
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  minio_data:
  grafana_data:
  prometheus_data:
